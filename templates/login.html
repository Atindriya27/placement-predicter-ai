<!DOCTYPE html>

<html>
<head>
    <title>Login</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<!-- Icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<!-- Your CSS -->
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar px-4 py-2">
    <div class="container-fluid d-flex justify-content-between">

    <!-- Logo -->
    <div class="d-flex align-items-center gap-2">
        <span style="font-size: 22px;">🎓</span>
        <span class="fw-semibold fs-5">Placement Predictor</span>
    </div>

    <!-- Toggle -->
    <button onclick="toggleTheme()" class="btn btn-outline-light btn-sm">
        🌗
    </button>

</div>

</nav>

<!-- LOGIN CARD -->

<div class="container d-flex justify-content-center align-items-center" style="height: 80vh;">

<div class="glass text-center" style="width: 350px;">

    <h3 class="mb-3">Welcome Back 👋</h3>
    <p class="mb-4">Login to continue</p>

    <form method="POST">

        <div class="mb-3">
            <input class="form-control" name="username" placeholder="Username" required>
        </div>

        <div class="mb-3">
            <input type="password" class="form-control" name="password" placeholder="Password" required>
        </div>

        <button class="btn btn-custom w-100">Login</button>

    </form>

    <p class="mt-3">
        Don't have an account? 
        <a href="/signup" style="color:#4facfe;">Signup</a>
    </p>
    <p class="mt-3">
        <a href="/terms" style="color:#4facfe;">View Terms & Conditions</a>
    </p>
</div>

</div>

<!-- SCRIPT -->

<script>
function toggleTheme() {
    if (document.body.classList.contains("dark")) {
        document.body.classList.remove("dark");
        document.body.classList.add("light");
        localStorage.setItem("theme", "light");
    } else {
        document.body.classList.remove("light");
        document.body.classList.add("dark");
        localStorage.setItem("theme", "dark");
    }
}

// Load saved theme properly
window.onload = () => {
    let saved = localStorage.getItem("theme");

    if (saved === "dark") {
        document.body.classList.add("dark");
    } else {
        document.body.classList.add("light");
    }
};
</script>

</body>
</html>
